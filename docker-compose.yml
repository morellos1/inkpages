services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: inkpages
      POSTGRES_PASSWORD: inkpages
      POSTGRES_DB: inkpages
    ports:
      # 5433 on the host to avoid clashing with any locally installed Postgres
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
